[workspace]
authors = ["dksasaki <dalton.sasaki@gmail.com>"]
channels = ["conda-forge"]
name = "ww3"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
gfortran = ">=15.1.0,<15.2"
netcdf-fortran = ">=4.6.2,<5"
openmpi = ">=5.0.8,<6"
gcc_linux-64 = ">=15.1.0,<16"
ncview = ">=2.1.8,<3"
cmake = ">=4.2.3,<5"

[activation.env]
CC = "gcc"
FC = "gfortran"
pixi_root = "$CONDA_PREFIX"
PATH = "$PATH:WW3/build/bin"

[activation]
scripts = ["experiments/ww3_functions.sh"]